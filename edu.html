<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>戰鬥編年史 | 張佳瑩</title>
    <style>
        :root { --gold: #c8aa6e; --blue: #0ac8b9; --dark: #010a13; }
        body { background: var(--dark); color: #f0e6d2; font-family: "Microsoft JhengHei", sans-serif; padding: 50px 20px; }
        .timeline { max-width: 800px; margin: auto; position: relative; }
        .timeline::before { content: ''; position: absolute; left: 50%; width: 2px; height: 100%; background: var(--gold); }
        .node { position: relative; margin-bottom: 50px; width: 50%; padding: 20px; box-sizing: border-box; }
        .node:nth-child(odd) { left: 0; text-align: right; padding-right: 40px; }
        .node:nth-child(even) { left: 50%; text-align: left; padding-left: 40px; }
        .node::after { content: '★'; position: absolute; top: 20px; width: 30px; height: 30px; background: var(--dark); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); text-align: center; line-height: 30px; }
        .node:nth-child(odd)::after { right: -17px; }
        .node:nth-child(even)::after { left: -17px; }
        .content { background: rgba(200,170,110,0.1); border: 1px solid var(--gold); padding: 15px; border-radius: 5px; }
        h3 { color: var(--blue); margin-top: 0; }
        .back { position: fixed; bottom: 20px; right: 20px; padding: 10px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>
    <div class="timeline">
        <div class="node">
            <div class="content">
                <h3>啟程：社會學洞察</h3>
                <p>大三轉入經濟系前，在社會學淬鍊宏觀視角。學會將「玩家選擇」放入社會結構中詮釋，這是我理解社群文化的核心引擎。</p>
            </div>
        </div>
        <div class="node">
            <div class="content">
                <h3>轉職：台大經濟雙修</h3>
                <p>為了兼顧愛好與專業，轉入經濟系。獲得了數理分析、消費者行為與決策邏輯，能以數據客觀解構市場現象。</p>
            </div>
        </div>
        <div class="node">
            <div class="content">
                <h3>公會任務：系學會活動部</h3>
                <p>擔任總召舉辦「酒精社會學」等活動。點滿了企劃、廠商溝通、社群宣傳與人力調度等實戰技能。</p>
            </div>
        </div>
        <div class="node">
            <div class="content">
                <h3>海外遠征：澳洲遊學</h3>
                <p>TOEIC 865分，通過中高級英檢。具備跨國溝通與獨立探索的探險者精神。</p>
            </div>
        </div>
    </div>
    <a href="index.html" class="back">← 返回營地</a>
</body>
</html>
