<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>角色裝備欄</title>
    <style>
        :root { --gold: #c8aa6e; --blue: #0ac8b9; --dark: #010a13; }
        body { background: var(--dark); color: #f0e6d2; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .character-view { position: relative; width: 600px; height: 500px; border: 2px solid var(--gold); padding: 20px; }
        .char-placeholder { width: 150px; height: 300px; border: 1px dashed var(--blue); margin: 50px auto; position: relative; display: flex; align-items: center; justify-content: center; }
        .item { position: absolute; border: 1px solid var(--gold); background: rgba(255,255,255,0.1); padding: 10px; width: 140px; font-size: 13px; }
        .head { top: 10px; left: 230px; } /* 領導力 */
        .chest { top: 150px; left: 40px; } /* 熱忱 */
        .hand { top: 150px; right: 40px; } /* 幽默 */
        .item-name { color: var(--gold); font-weight: bold; display: block; }
        .back { position: absolute; bottom: 20px; right: 20px; color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 5px 15px; }
    </style>
</head>
<body>
    <div class="character-view">
        <h2 style="text-align: center; color: var(--blue);">[ 英雄天賦裝備 ]</h2>
        <div class="char-placeholder">
            人物剪影
            <div class="item head">
                <span class="item-name">頭飾：領航者之冠</span>
                國小至高中班長、系隊隊長。具備主導練球與任務分配的領導力。
            </div>
            <div class="item chest">
                <span class="item-name">胸甲：籃球之心</span>
                對喜歡的事物充滿極限熱忱。轉系雙修只為了兼顧職業與愛好。
            </div>
            <div class="item hand">
                <span class="item-name">武器：幽默之聲</span>
                抓住注意力的藝術。透過幽默讓溝通對象不知不覺接納資訊。
            </div>
        </div>
        <a href="index.html" class="back">← 返回主城</a>
    </div>
</body>
</html>
