<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>任務：為什麼加入 Garena</title>
    <style>
        :root { --gold: #c8aa6e; --blue: #0ac8b9; --dark: #010a13; }
        body { background: var(--dark); color: #f0e6d2; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100vh; margin: 0; padding-bottom: 50px; }
        .dialog-box { width: 80%; max-width: 800px; border: 3px solid var(--gold); background: rgba(0,0,0,0.9); padding: 30px; position: relative; }
        .npc-name { position: absolute; top: -20px; left: 20px; background: var(--gold); color: #000; padding: 5px 20px; font-weight: bold; }
        .text { font-size: 1.2em; line-height: 1.6; min-height: 100px; }
        .options { margin-top: 20px; display: flex; gap: 10px; }
        .opt { border: 1px solid var(--blue); color: var(--blue); padding: 5px 15px; cursor: pointer; text-decoration: none; }
        .opt:hover { background: var(--blue); color: #000; }
    </style>
</head>
<body>
    <div class="dialog-box">
        <div class="npc-name">冒險者 張佳瑩</div>
        <div class="text" id="typewriter">
            「我是《傳說對決》9年的老玩家。對我來說，遊戲是現實的出口。我認同 Garena 『讓玩家滿意，是我們回家的路』的理念。我希望加入最好的團隊，讓情感連結成為玩家的歸屬。」
        </div>
        <div class="options">
            <a href="index.html" class="opt">接受任務：加入 Garena</a>
            <a href="index.html" class="opt">返回主選單</a>
        </div>
    </div>
</body>
</html>
