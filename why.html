<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>為什麼選擇 Garena</title>
    <style>
        :root { --gold: #c8aa6e; --blue: #0ac8b9; --dark: #010a13; }
        body { background: var(--dark); color: #f0e6d2; font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { width: 100%; max-width: 750px; border: 2px solid var(--gold); background: rgba(5, 25, 35, 0.95); padding: 40px; }
        h2 { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .quote { font-style: italic; color: var(--blue); border-left: 4px solid var(--blue); padding-left: 15px; margin: 25px 0; font-size: 1.1em; }
        p { line-height: 1.8; color: #ccc; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 10px 20px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>[ 任務動機：為什麼是 Garena ]</h2>

        <p>作為《傳說對決》9 年的長期玩家，我對遊戲不只是娛樂，更是一種社群連結與情感歸屬。我希望在最好的遊戲企業學習，與頂尖團隊並肩作戰。</p>

        <div class="quote">「 讓玩家滿意，是我們回家的路 」</div>

        <p>這句話深深觸動我。對我而言，一個好的遊戲可以調節情緒、建立連結。我希望運用我的社群觀察力與分析背景，讓玩家在活動與內容設計中，重新感受到這份歸屬感與歸向感。</p>

        <a href="index.html" class="back-btn">← 返回主選單</a>
    </div>
</body>
</html>
