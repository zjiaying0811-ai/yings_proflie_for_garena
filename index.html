<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>召喚師履歷 | 張佳瑩 YING</title>
    <style>
        :root {
            --gold: #c8aa6e;
            --blue: #0ac8b9;
            --dark: #010a13;
        }
        body {
            background: var(--dark);
            background-image: radial-gradient(circle, #051923 0%, #010a13 100%);
            color: #f0e6d2;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* 防止滾動條影響遊戲感 */
            cursor: crosshair;
        }
        .interface {
            border: 2px solid var(--gold);
            padding: 40px;
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 30px rgba(200, 170, 110, 0.3);
            text-align: center;
            width: 90%;
            max-width: 650px;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { color: var(--gold); letter-spacing: 5px; margin-bottom: 5px; font-size: 2.5em; }
        .sub-info { color: var(--blue); font-weight: bold; letter-spacing: 2px; margin-bottom: 20px; }
        
        .skill-group { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            margin-top: 30px; 
        }
        
        /* 連結樣式重置 */
        .skill-link { text-decoration: none; color: inherit; display: block; }

        .skill {
            position: relative;
            height: 80px;
            border: 2px solid #5c5b57;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #1e2328 0%, #010a13 100%);
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            font-size: 18px;
        }
        .skill:hover { 
            border-color: var(--gold); 
            box-shadow: 0 0 25px var(--gold); 
            transform: translateY(-5px);
            background: linear-gradient(180deg, #2a2f35 0%, #051923 100%);
        }
        .key {
            position: absolute;
            top: -10px;
            left: 10px;
            background: var(--gold);
            color: #000;
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .footer-hint { margin-top: 40px; font-size: 12px; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="interface">
    <h1>張佳瑩 YING</h1>
    <div class="sub-info">等級 30 | 台大經濟系</div>
    <hr style="border: 0.5px solid var(--gold); opacity: 0.3; width: 80%;">
    
    <div class="skill-group">
        <a href="https://your-link-here.com/edu" class="skill-link" id="link-W">
            <div class="skill" id="W"><span class="key">W</span>學經歷</div>
        </a>
        <a href="https://your-link-here.com/skills" class="skill-link" id="link-A">
            <div class="skill" id="A"><span class="key">A</span>能力</div>
        </a>
        <a href="https://your-link-here.com/traits" class="skill-link" id="link-S">
            <div class="skill" id="S"><span class="key">S</span>個人特質</div>
        </a>
        <a href="https://your-link-here.com/why" class="skill-link" id="link-D">
            <div class="skill" id="D"><span class="key">D</span>WHY Garena</div>
        </a>
    </div>
    
    <p class="footer-hint">[ 提示：點擊按鈕或按下鍵盤 WASD 進行轉跳 ]</p>
</div>

<script>
    const sound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

    function triggerAction(id) {
        const el = document.getElementById(id);
        const linkEl = document.getElementById('link-' + id);
        if(!el) return;
        
        // 播放音效
        sound.currentTime = 0;
        sound.play();

        // 視覺回饋
        el.style.boxShadow = "0 0 50px white";
        el.style.borderColor = "white";
        
        // 延遲一小段時間再跳轉，讓使用者能看到動畫並聽到聲音
        setTimeout(() => {
            if(linkEl) {
                window.location.href = linkEl.href; 
            }
        }, 300);
    }

    // 鍵盤偵測 (WASD)
    window.addEventListener('keydown', (e) => {
        const key = e.key.toUpperCase();
        if(['W','A','S','D'].includes(key)) {
            triggerAction(key);
        }
    });

    // 點擊事件由 <a> 標籤自然觸發，但為了加上聲音特效，我們攔截它
    document.querySelectorAll('.skill-link').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault(); // 先阻止直接跳轉
            const id = this.querySelector('.skill').id;
            triggerAction(id); // 執行帶有特效的跳轉
        });
    });
</script>

</body>
</html>
