<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色天賦：個人特質</title>
    <style>
        :root { --gold: #c8aa6e; --blue: #0ac8b9; --dark: #010a13; }
        body { background: var(--dark); color: #f0e6d2; font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { width: 100%; max-width: 750px; border: 2px solid var(--gold); background: rgba(5, 25, 35, 0.95); padding: 40px; }
        h2 { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .trait-box { margin-top: 25px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 5px; }
        h3 { color: var(--blue); margin: 0 0 10px 0; }
        p { color: #ccc; line-height: 1.6; font-size: 0.95em; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 10px 20px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>[ 被動技能：個人特質 ]</h2>

        <div class="trait-box">
            <h3>熱忱 (Passion)</h3>
            <p>熱情是我的燃料。為了打籃球而轉入經濟系雙主修，這份積極性能讓我全心投入所愛的遊戲領域。</p>
        </div>

        <div class="trait-box">
            <h3>領導力 (Leadership)</h3>
            <p>從班長到大學球隊隊長，我能兼顧上級任務與同僚關係，並在關鍵時刻給予他人協助。 </p>
        </div>

        <div class="trait-box">
            <h3>幽默 (Humor)</h3>
            <p>行銷需要抓住注意力。幽默是我在溝通中輸出資訊的關鍵，讓溝通對象在愉快的氛圍中產生認同。</p>
        </div>

        <a href="index.html" class="back-btn">← 返回主選單</a>
    </div>
</body>
</html>
