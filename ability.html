<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>技能圖鑑</title>
    <style>
        :root { --gold: #c8aa6e; --blue: #0ac8b9; --dark: #010a13; }
        body { background: var(--dark); color: #f0e6d2; text-align: center; padding: 50px; font-family: sans-serif; }
        .skill-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 900px; margin: auto; }
        .skill-icon { border: 3px solid var(--gold); padding: 20px; background: rgba(255,255,255,0.05); transition: 0.3s; cursor: help; position: relative; }
        .skill-icon:hover { background: var(--gold); color: var(--dark); transform: scale(1.05); }
        .skill-icon i { font-size: 40px; display: block; margin-bottom: 10px; }
        .tooltip { visibility: hidden; width: 250px; background: #333; color: #fff; text-align: left; padding: 15px; position: absolute; z-index: 1; bottom: 110%; left: 50%; margin-left: -125px; border: 1px solid var(--blue); }
        .skill-icon:hover .tooltip { visibility: visible; }
        .back { margin-top: 50px; display: inline-block; color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>[ 核心技能解鎖 ]</h1>
    <div class="skill-grid">
        <div class="skill-icon">
            <i>✍️</i> 文案寫作
            <div class="tooltip">學測國文15級分，獲文學獎。具備精準的文字渲染力與圖文整合社群行銷能力。</div>
        </div>
        <div class="skill-icon">
            <i>👁️</i> 社群觀察
            <div class="tooltip">對Threads/FB/IG輿論高度敏感。能快速捕捉社群情緒轉變與議題動向。</div>
        </div>
        <div class="skill-icon">
            <i>📊</i> 數據處理
            <div class="tooltip">執行國科會計畫，掌握SPSS與R語言，能從數據中給出客觀的市場詮釋。</div>
        </div>
        <div class="skill-icon">
            <i>💻</i> AI & Coding
            <div class="tooltip">具C++基礎，能獨立與AI協作架設網頁與App。能與工程團隊高效對接需求。</div>
        </div>
        <div class="skill-icon">
            <i>🗣️</i> 溝通表達
            <div class="tooltip">社會學討論課淬鍊，樂於扁平化討論，能清楚傳達觀點並給予多樣化視角。</div>
        </div>
        <div class="skill-icon">
            <i>🎨</i> 美術表現
            <div class="tooltip">具繪畫能力與視覺設計敏感度，理解色彩與構圖的黃金比例。</div>
        </div>
    </div>
    <a href="index.html" class="back">← 返回營地</a>
</body>
</html>
