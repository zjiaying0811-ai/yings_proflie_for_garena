<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戰鬥紀錄：學經歷</title>
    <style>
        :root { --gold: #c8aa6e; --blue: #0ac8b9; --dark: #010a13; }
        body { background: var(--dark); color: #f0e6d2; font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { width: 100%; max-width: 750px; border: 2px solid var(--gold); background: rgba(5, 25, 35, 0.95); padding: 40px; box-shadow: 0 0 50px #000; position: relative; }
        h2 { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; letter-spacing: 2px; }
        .section-title { color: var(--blue); font-weight: bold; margin-top: 25px; font-size: 1.1em; display: flex; align-items: center; }
        .section-title::before { content: "▶"; margin-right: 10px; font-size: 0.8em; }
        p { line-height: 1.7; color: #ccc; margin: 10px 0 20px 25px; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 10px 20px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: var(--gold); color: var(--dark); box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>
    <div class="card">
        <h2>[ 檔案編號：張佳瑩 YING ]</h2>
        
        <div class="section-title">自我介紹</div>
        <p>目前就讀於臺灣大學經濟學系，雙主修社會學。擅長將經濟學的決策邏輯與社會學的脈絡觀察結合，轉化為對市場與社群文化的獨到見解。</p>

        <div class="section-title">學術背景：經濟與社會學</div>
        <p>經濟學訓練讓我具備數理分析與消費者行為理論；社會學則培養我宏觀觀察玩家選擇的能力。這種跨學科視野，能讓我精準詮釋玩家在社群中的情緒轉變。</p>

        <div class="section-title">組織經歷：系學會活動部</div>
        <p>擔任總召舉辦大型活動，從企劃、廠商溝通到社群宣傳一手包辦，具備強大的團隊推進與人力協調能力。</p>

        <div class="section-title">語言能力</div>
        <p>TOEIC 865 分 / 全民英檢中高級 / 澳洲短期遊學經驗。</p>

        <a href="index.html" class="back-btn">← 返回主選單</a>
    </div>
</body>
</html>
